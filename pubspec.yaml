name: myapp
description: "A robust, multi-language text editor for Android."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter

  # Editor core
  flutter_code_editor: ^0.3.5
  flutter_highlight: ^0.7.0
  highlight: ^0.7.0

  # File I/O & Storage
  file_picker: ^10.3.10
  path_provider: ^2.1.5
  permission_handler: ^12.0.1
  shared_preferences: ^2.5.4

  # State management
  flutter_riverpod: ^3.2.1

  # Routing
  go_router: ^15.1.2

  # UI
  google_fonts: ^8.0.2
  cupertino_icons: ^1.0.8

  # Splash & Icons
  flutter_native_splash: ^2.4.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

# Launcher Icons configuration
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#1A237E"
  adaptive_icon_foreground: "assets/images/app_icon.png"
  min_sdk_android: 21

# Native Splash Screen configuration
flutter_native_splash:
  color: "#1A237E"
  image: "assets/images/app_icon.png"
  android_12:
    color: "#1A237E"
    icon_background_color: "#1A237E"
    image: "assets/images/app_icon.png"
  android: true
  ios: false
  web: false

flutter:
  uses-material-design: true
  assets:
    - assets/images/
